<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Code Shame</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <div class="title-line">
            <button id="title-logo" class="title-logo" type="button" aria-label="Enter demo mode" title="Enter demo mode">
              <i class="title-icon" data-lucide="scan-face" aria-hidden="true"></i>
              <i class="title-logo-demo" data-lucide="drama" aria-hidden="true"></i>
            </button>
            <h1>Code Shame</h1>
          </div>
        </div>
        <div class="toolbar">
          <label id="auto-refresh-control" class="auto-refresh">
            <input id="auto-refresh" class="auto-refresh-input" type="checkbox">
            <span id="auto-refresh-progress" class="auto-refresh-ring" aria-hidden="true"></span>
            <span class="button-label">Auto refresh</span>
          </label>
          <button id="copy-report" class="secondary-button icon-button" type="button" disabled>
            <i data-lucide="copy" aria-hidden="true"></i>
            <span class="button-label">Copy report</span>
          </button>
          <button id="refresh-button" class="icon-button" type="button">
            <i data-lucide="refresh-cw" aria-hidden="true"></i>
            <span class="button-label">Refresh</span>
          </button>
        </div>
      </header>

      <section id="error-banner" class="error-banner" aria-live="assertive" hidden></section>

      <section class="analysis-grid">
        <div class="main-column">
          <section id="blocking-findings" class="panel panel-critical">
            <div class="panel-header">
              <div class="section-title section-title-critical">
                <i class="section-icon" data-lucide="circle-x" aria-hidden="true"></i>
                <h2>Blocking Findings</h2>
                <span id="blocking-count" class="panel-count">0</span>
              </div>
              <button id="copy-blocking" class="copy-section icon-button" type="button" disabled>
                <i data-lucide="copy" aria-hidden="true"></i>
                <span class="button-label">Copy</span>
              </button>
            </div>
            <div id="check-sections" class="stack-list"></div>
          </section>

          <section id="refactoring-suggestions" class="panel panel-refactoring targets-panel">
            <div class="panel-header">
              <div class="section-title section-title-refactoring">
                <i class="section-icon" data-lucide="scissors" aria-hidden="true"></i>
                <h2>Refactoring Suggestions</h2>
                <span id="target-count" class="panel-count">0</span>
              </div>
              <button id="copy-refactoring" class="copy-section icon-button" type="button" disabled>
                <i data-lucide="copy" aria-hidden="true"></i>
                <span class="button-label">Copy</span>
              </button>
            </div>
            <div id="targets-list" class="target-grid"></div>
          </section>

          <section id="unusually-reused-files" class="panel panel-coupling">
            <div class="panel-header">
              <div id="coupling-subhead" class="section-title section-title-coupling">
                <i class="section-icon" data-lucide="git-branch" aria-hidden="true"></i>
                <h2>Coupling</h2>
                <span id="coupling-count" class="panel-count">0</span>
              </div>
              <button id="copy-coupling" class="copy-section icon-button" type="button" disabled>
                <i data-lucide="copy" aria-hidden="true"></i>
                <span class="button-label">Copy</span>
              </button>
            </div>
            <div id="coupling-files" class="target-grid coupling-grid"></div>
          </section>

          <section id="lowest-maintainability" class="panel panel-maintainability">
            <div class="panel-header">
              <div id="maintainability-subhead" class="section-title section-title-maintainability">
                <i class="section-icon" data-lucide="bar-chart-3" aria-hidden="true"></i>
                <h2>Lowest Maintainability</h2>
                <span id="maintainability-count" class="panel-count">0%</span>
              </div>
              <button id="copy-maintainability" class="copy-section icon-button" type="button" disabled>
                <i data-lucide="copy" aria-hidden="true"></i>
                <span class="button-label">Copy</span>
              </button>
            </div>
            <div id="file-scores" class="stack-list"></div>
          </section>
        </div>

        <aside class="health-panel">
          <section id="overview-grid" class="overview-grid"></section>
          <div id="health-summary" class="health-summary"></div>
        </aside>
      </section>

      <footer class="app-footer">
        Code Shame 0.1.0 · Made with <a href="https://github.com/fallow-rs/fallow">Fallow 2.91.0</a>
      </footer>
    </main>

    <script src="/vendor/lucide.js"></script>
    <script src="/app-format.js"></script>
    <script src="/app-copy.js"></script>
    <script src="/app-icons.js"></script>
    <script src="/app-findings.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
